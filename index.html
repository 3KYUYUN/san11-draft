<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>三國志11 PVP 武將選秀</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c2f27">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="武將選秀">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<!-- 連線設定：獨立檔案，更新網頁時不會被覆蓋。沒有這個檔案就是單機模式 -->
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111b16;          /* 墨底 */
  --lacquer:#1c2f27;      /* 漆綠面板 */
  --lacquer-2:#24382e;
  --bronze:#5f7a55;       /* 青銅框 */
  --bronze-dim:#3c5140;
  --gold:#c9a35c;         /* 舊金 */
  --gold-bright:#e4c987;
  --seal:#b03a2e;         /* 印璽紅 */
  --seal-bright:#d4553f;
  --map:#d9cdb4;          /* 圖紙米 */
  --text:#e6dfcc;
  --text-dim:#9aa892;
  --serif:"Noto Serif TC","PMingLiU",serif;
  --sans:"Noto Sans TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:14px;
  background-image:radial-gradient(ellipse at 20% -10%, rgba(95,122,85,.14), transparent 55%),
                   radial-gradient(ellipse at 100% 110%, rgba(201,163,92,.07), transparent 50%);}
button{font-family:var(--sans);cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--bronze-dim);border-radius:5px}

/* ── 頂列 ─────────────────────────── */
header{display:flex;align-items:center;gap:16px;padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
  border-bottom:2px solid var(--bronze-dim);background:linear-gradient(180deg,#182720,#131f1a)}
h1{font-family:var(--serif);font-weight:900;font-size:20px;letter-spacing:4px;color:var(--gold-bright)}
h1 .sub{font-size:12px;letter-spacing:2px;color:var(--text-dim);font-family:var(--sans);font-weight:400;margin-left:10px}
.hbtns{margin-left:auto;display:flex;gap:8px}
.btn{background:var(--lacquer-2);border:1px solid var(--bronze);color:var(--text);
  padding:7px 14px;border-radius:3px;font-size:13px;letter-spacing:1px;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold-bright)}
.btn.seal{background:var(--seal);border-color:var(--seal-bright);color:#fff;font-weight:700}
.btn.seal:hover{background:var(--seal-bright)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── 當前選秀 + 蛇形順序條 ─────────── */
#pickbar{display:flex;align-items:center;gap:14px;padding:10px 18px;
  background:var(--lacquer);border-bottom:1px solid var(--bronze-dim)}
#nowpick{flex-shrink:0;display:flex;align-items:center;gap:10px}
#nowpick .plate{font-family:var(--serif);font-weight:900;font-size:17px;color:#fff;
  background:var(--seal);padding:6px 16px;border-radius:2px;letter-spacing:2px;
  box-shadow:0 0 0 1px var(--seal-bright), 0 0 14px rgba(212,85,63,.45)}
#nowpick .round{font-size:12px;color:var(--text-dim);letter-spacing:1px}
#snake{display:flex;gap:4px;overflow-x:auto;padding:2px;flex:1}
.snakecell{flex-shrink:0;width:34px;height:34px;border:1px solid var(--bronze-dim);border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim);
  background:var(--ink);position:relative}
.snakecell .tn{font-size:11px;font-weight:700;color:var(--text)}
.snakecell.done{background:var(--lacquer-2);border-color:var(--bronze)}
.snakecell.done .tn{color:var(--gold)}
.snakecell.cur{border-color:var(--seal-bright);box-shadow:0 0 8px rgba(212,85,63,.6);background:#2a1713}
.snakecell.cur .tn{color:var(--seal-bright)}
.snakecell.rev::after{content:"↩";position:absolute;top:-7px;right:-2px;font-size:9px;color:var(--gold)}

/* ── 主佈局 ───────────────────────── */
#main{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 118px)}

/* ── 平板 ── */
@media (max-width:1100px){
  #main{grid-template-columns:290px 1fr}
  table{font-size:12px}
  thead th{font-size:11px;padding:6px 3px}
}
/* ── 手機／窄平板 ── */
@media (max-width:820px){
  body{font-size:15px}
  header{flex-wrap:wrap;gap:8px;padding:8px 10px;position:sticky;top:0;z-index:20}
  h1{font-size:16px;letter-spacing:2px;width:100%}
  h1 .sub{display:block;margin:2px 0 0;font-size:11px}
  .hbtns{margin-left:0;width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .hbtns .btn{padding:9px 4px;font-size:12px;letter-spacing:0}
  #btnExport{grid-column:span 3}
  #pickbar{flex-direction:column;align-items:stretch;gap:8px;padding:8px 10px;position:sticky;top:0;z-index:10}
  #nowpick{justify-content:space-between}
  #nowpick .plate{font-size:15px;padding:5px 12px}
  #nowpick .round{font-size:11px;text-align:right}
  #snake{gap:3px}
  .snakecell{width:30px;height:30px}
  /* 單欄堆疊：地圖（可摺疊）＋隊伍 → 武將池 */
  #main{display:flex;flex-direction:column;height:auto}
  #sidebar{order:1;border-right:none;border-bottom:2px solid var(--bronze-dim);overflow:visible;max-height:none}
  #pool{order:2;height:auto}
  #teams{padding:8px;overflow:visible}
  #mappanel{padding:6px 8px}
  #minimap{max-height:52vh}
  #mapToggle{display:inline-block}
  #mappanel.collapsed #minimap{display:none}
  #filters{gap:6px;padding:8px 10px}
  #filters input[type=text]{width:100%;flex:1 1 100%;padding:9px 10px}
  #filters select{flex:1 1 30%;padding:8px 4px;font-size:12px}
  #filters .tog{font-size:11px;flex:0 0 auto}
  #sortClear{flex:0 0 auto}
  #count{width:100%;text-align:right;margin-left:0}
  #tablewrap{max-height:60vh;overflow:auto}
  table{min-width:760px}          /* 橫向捲動看完整欄位 */
  tbody tr{height:44px}           /* 手指易點 */
  tbody td{padding:8px 4px}
  dialog{padding:14px;width:96vw;max-height:88vh}
  dialog textarea{min-height:220px;font-size:11px}
  .drow{flex-direction:column;gap:6px}
  #colorgrid{grid-template-columns:repeat(5,1fr)}
  .chip,.citychip{font-size:13px;padding:4px 7px}
  .chip .rm,.citychip .crm{font-size:15px;padding:0 5px}
  .assignrow .cbtn{padding:5px 9px;font-size:12px}
  .seatline .claim{padding:5px 10px}
  #toast{bottom:14px;width:88vw;text-align:center}
}
@media (max-width:420px){
  .hbtns{grid-template-columns:repeat(2,1fr)}
  #btnExport{grid-column:span 2}
  h1{font-size:15px}
  table{min-width:700px}
}
/* 觸控裝置：hover 效果不黏住 */
@media (hover:none){
  tbody tr:hover{background:none}
  .btn:hover{border-color:var(--bronze);color:var(--text)}
}

/* 隊伍側欄 */
#sidebar{overflow-y:auto;border-right:2px solid var(--bronze-dim);display:flex;flex-direction:column}
#mappanel{padding:8px 10px 4px;border-bottom:1px solid var(--bronze-dim);background:var(--lacquer)}
#maphead{font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
#mapToggle{display:none;background:var(--ink);border:1px solid var(--bronze-dim);color:var(--text-dim);
  font-size:11px;padding:3px 9px;border-radius:2px;cursor:pointer}
#mapToggle:hover{border-color:var(--gold);color:var(--gold-bright)}
#maphead #mapteam{color:var(--gold-bright);font-weight:700}
#minimap{width:100%;background:#d9cdb4;border:1px solid var(--bronze);border-radius:3px;cursor:pointer}
#minimap .citybox{stroke:#6b5f45;stroke-width:4;fill:#f3ecd9}
#minimap .citybox:hover{stroke:#b03a2e;stroke-width:7}
#minimap .capital{stroke:#b03a2e;stroke-width:6}
#minimap text{font-size:30px;fill:#4a4132;pointer-events:none;font-family:var(--sans)}
#teams{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;flex:1}
.team{background:var(--lacquer);border:1px solid var(--bronze-dim);border-radius:4px;padding:8px 10px}
.team.cur{border-color:var(--seal-bright);box-shadow:0 0 10px rgba(212,85,63,.35)}
.team.act{background:#26402f}
.seatline{font-size:11px;color:var(--text-dim);margin:2px 0 4px;display:flex;align-items:center;gap:6px}
.seatline b{color:var(--gold-bright)}
.seatline .claim{background:var(--ink);border:1px solid var(--bronze-dim);color:var(--text);font-size:11px;padding:1px 8px;border-radius:2px}
.seatline .claim:hover{border-color:var(--gold)}
.team .tdot{width:16px;height:16px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.35);cursor:pointer;padding:0}
.team .tdot:hover{outline:2px solid var(--gold)}
#colorgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
#colorgrid .sw{aspect-ratio:1;border:1px solid #000;border-radius:2px;cursor:pointer;font-size:9px;color:rgba(255,255,255,.75);padding:0}
#colorgrid .sw.on{outline:3px solid var(--gold-bright)}
#colorgrid .sw:hover{outline:2px solid #fff}
#skOpts .skopt{flex:1;min-width:90px;font-size:15px;padding:12px;font-family:var(--serif);font-weight:700}
#skOpts .skopt:hover{background:var(--seal);border-color:var(--seal-bright);color:#fff}
.citychip.cap{background:#3a2420}
.capmark{color:var(--seal-bright);font-family:var(--serif);margin-right:2px;font-style:normal}
.octag{font-size:10px;color:var(--gold);font-style:normal;margin-left:3px}
.sktag{font-size:10px;color:#d4b8f0;font-style:normal;margin-left:3px}
.chipname{cursor:pointer}
.chip.open{border-color:var(--gold)}
.assignrow{width:100%;font-size:11px;color:var(--text-dim);padding:3px 2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.assignrow .cbtn{background:var(--ink);border:1px solid var(--bronze-dim);color:var(--text);font-size:11px;padding:1px 6px;border-radius:2px}
.assignrow .cbtn.on{border-color:var(--seal-bright);color:var(--gold-bright)}
.team .tcity{flex-wrap:wrap}
.citychip{display:inline-flex;align-items:center;gap:2px;border:1px solid;border-radius:3px;padding:0 4px;font-size:11px;margin:1px 2px;color:var(--text)}
.citychip .crm{border:none;background:none;color:var(--text-dim);padding:0;font-size:11px;cursor:pointer}
.citychip .crm:hover{color:var(--seal-bright)}
.team .thead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.team .tname{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--gold-bright);letter-spacing:1px;
  background:none;border:none;border-bottom:1px dashed transparent;width:90px}
.team .tname:focus{outline:none;border-bottom-color:var(--gold)}
.team .tstat{margin-left:auto;font-size:11px;color:var(--text-dim);text-align:right;line-height:1.5}
.team .tcity{display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px;font-size:12px;color:var(--text-dim);margin-bottom:6px}
.team .tcity input{background:var(--ink);border:1px solid var(--bronze-dim);color:var(--text);
  padding:2px 6px;width:80px;border-radius:2px;font-size:12px}
.picks{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--ink);border:1px solid var(--bronze-dim);
  border-radius:3px;padding:2px 6px;font-size:12px}
.chip .lord{width:16px;height:16px;border-radius:2px;background:transparent;border:1px solid var(--bronze-dim);
  color:var(--text-dim);font-size:10px;line-height:14px;text-align:center;font-family:var(--serif);padding:0}
.chip .lord.on{background:var(--seal);border-color:var(--seal-bright);color:#fff;font-weight:900}
.chip .rm{border:none;background:none;color:var(--text-dim);font-size:12px;padding:0 2px}
.chip .rm:hover{color:var(--seal-bright)}
.chip.custom{border-color:#7a6a3c}

/* 武將池 */
#pool{display:flex;flex-direction:column;overflow:hidden}
#filters{display:flex;gap:8px;align-items:center;padding:10px 14px;flex-wrap:wrap;
  background:var(--lacquer);border-bottom:1px solid var(--bronze-dim)}
#filters input[type=text]{background:var(--ink);border:1px solid var(--bronze);color:var(--text);
  padding:6px 10px;border-radius:3px;width:200px;font-size:13px}
#filters select{background:var(--ink);border:1px solid var(--bronze);color:var(--text);padding:6px;border-radius:3px;font-size:13px}
.tog{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);user-select:none;cursor:pointer}
.tog input{accent-color:var(--seal)}
#count{margin-left:auto;font-size:12px;color:var(--text-dim)}
#tablewrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{position:sticky;top:0;background:#16241d;color:var(--gold);font-weight:500;letter-spacing:1px;
  padding:7px 6px;border-bottom:1px solid var(--bronze);cursor:pointer;white-space:nowrap;z-index:2;font-size:12px}
thead th:hover{color:var(--gold-bright)}
thead th.sorted{color:var(--gold-bright)}
thead th.sorted::after{content:" ▾";font-size:9px}
thead th.sorted.asc::after{content:" ▴"}
thead th .srank{font-style:normal;font-size:9px;background:var(--seal);color:#fff;border-radius:6px;padding:0 4px;margin-left:2px;vertical-align:2px}
tbody td{padding:5px 4px;border-bottom:1px solid #1e2c25;white-space:nowrap;text-align:center;overflow:hidden;text-overflow:ellipsis}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#26382c}
tbody tr:hover td:first-child{color:var(--gold-bright)}
tbody tr.taken{opacity:.32;cursor:default}
tbody tr.taken:hover{background:none}
td.nm{font-family:var(--serif);font-size:14px;font-weight:600;letter-spacing:1px}
td.num{font-variant-numeric:tabular-nums}
td.price{color:var(--gold-bright);font-weight:700}
.badge{display:inline-block;font-size:10px;padding:0 4px;border-radius:2px;margin-left:4px;vertical-align:1px}
.badge.f{background:#6d3a55;color:#f4cfe4}
.badge.g{background:#3c5063;color:#cfe4f4}
.badge.c{background:#7a6a3c;color:#f4e9cf}
.apt{font-family:var(--sans);letter-spacing:0}
.apt b{font-weight:700}
.apt .S{color:#e4c987}.apt .A{color:#a8c98a}.apt .B{color:#8aa5b8;font-weight:400}.apt .C{color:#5c6b60;font-weight:400}
.skill{color:#d4b8f0}
.owner{font-size:11px;color:var(--text-dim)}

/* 對話框 */
dialog{background:var(--lacquer);color:var(--text);border:2px solid var(--bronze);border-radius:6px;
  padding:20px;max-width:640px;width:92vw;max-height:86vh;overflow:auto;
  margin:auto;position:fixed;inset:0;box-shadow:0 10px 50px rgba(0,0,0,.6)}
dialog:not([open]){display:none}
dialog::backdrop{background:rgba(5,10,8,.75)}
dialog h2{font-family:var(--serif);color:var(--gold-bright);letter-spacing:3px;font-size:17px;margin-bottom:14px}
dialog label{display:block;font-size:13px;color:var(--text-dim);margin:10px 0 4px}
dialog input[type=number],dialog input[type=text],dialog select,dialog textarea{
  background:var(--ink);border:1px solid var(--bronze);color:var(--text);padding:6px 8px;border-radius:3px;font-size:13px;width:100%}
dialog textarea{font-family:ui-monospace,Consolas,monospace;font-size:12px;min-height:300px;white-space:pre}
.drow{display:flex;gap:10px}.drow>*{flex:1}
.dbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
#teamnames .drow{margin-bottom:6px}
.note{font-size:12px;color:var(--text-dim);line-height:1.6;margin-top:8px}
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--seal);color:#fff;
  padding:9px 22px;border-radius:3px;font-size:14px;letter-spacing:1px;opacity:0;pointer-events:none;
  transition:opacity .25s;box-shadow:0 2px 14px rgba(0,0,0,.5);font-family:var(--serif);font-weight:700;z-index:99}
#toast.show{opacity:1}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <h1>三國志11 武將選秀<span class="sub" id="netstatus">單機模式</span></h1>
  <div class="hbtns">
    <button class="btn" id="btnUndo">復原上一選</button>
    <button class="btn" id="btnSettings">設定</button>
    <button class="btn" id="btnInstall" style="display:none">安裝</button>
    <button class="btn" id="btnRoom">房間</button>
    <button class="btn" id="btnSave">存/讀進度</button>
    <button class="btn seal" id="btnExport">匯出設定檔</button>
  </div>
</header>

<div id="pickbar">
  <div id="nowpick">
    <span class="plate" id="npTeam">—</span>
    <span class="round" id="npRound"></span>
  </div>
  <div id="snake"></div>
</div>

<div id="main">
  <aside id="sidebar">
    <div id="mappanel">
      <div id="maphead"><button id="mapToggle" aria-expanded="true">收合</button>選城地圖 <span id="mapteam"></span></div>
      <svg id="minimap" viewBox="12 138 1024 1020" role="img" aria-label="城市地圖"></svg>
    </div>
    <div id="teams"></div>
  </aside>
  <section id="pool">
    <div id="filters">
      <input type="text" id="q" placeholder="搜尋姓名 / 特技…">
      <select id="priceCol"></select>
      <select id="aptKind"><option value="-1">適性—</option><option value="19">槍</option><option value="20">戟</option><option value="21">弩</option><option value="22">騎</option><option value="23">兵</option><option value="24">水</option></select>
      <select id="aptMin"><option value="1">B以上</option><option value="2">A以上</option><option value="3" selected>S</option></select>
      <label class="tog"><input type="checkbox" id="fHide" checked>隱藏已選</label>
      <label class="tog"><input type="checkbox" id="fFemale">女</label>
      <label class="tog"><input type="checkbox" id="fAncient">古武將</label>
      <label class="tog"><input type="checkbox" id="f38R">38R古武</label>
      <label class="tog"><input type="checkbox" id="fRadish">蘿蔔</label>
      <label class="tog"><input type="checkbox" id="fYuyun">瑜雲</label>
      <button class="btn" id="sortClear" style="padding:4px 10px;font-size:12px">清除排序</button>
      <span id="count"></span>
    </div>
    <div id="tablewrap"><table>
      <colgroup>
        <col style="width:11%"><col style="width:6.5%"><col style="width:5%">
        <col style="width:5%"><col style="width:5%"><col style="width:5%"><col style="width:5%"><col style="width:5%">
        <col style="width:5.5%"><col style="width:6%"><col style="width:5.5%"><col style="width:9%">
        <col style="width:3.8%"><col style="width:3.8%"><col style="width:3.8%"><col style="width:3.8%"><col style="width:3.8%"><col style="width:3.8%">
        <col style="width:8%">
      </colgroup>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table></div>
  </section>
</div>

<dialog id="dlgSkill">
  <h2>選擇特技</h2>
  <p class="note"><b id="skName" style="color:var(--gold-bright);font-size:16px"></b> 是瑜雲武將，請選擇他的特技。<br>
    <b style="color:var(--seal-bright)">選定後不可更改。</b></p>
  <div id="skOpts" style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"></div>
</dialog>

<dialog id="dlgRoom">
  <h2>連線房間</h2>
  <div id="roomOffline">
    <label>你的暱稱</label>
    <input type="text" id="rmName" maxlength="12" placeholder="例：抗壓">
    <div class="drow" style="margin-top:10px">
      <div>
        <button class="btn seal" id="rmCreate" style="width:100%">建立房間（主持人）</button>
        <p class="note">建立後會得到房間碼與主持金鑰，只把房間碼給你授權的玩家。</p>
      </div>
      <div>
        <label>房間碼</label>

<dialog id="dlgSettings">
  <h2>選秀設定</h2>
  <div class="drow">
    <div><label>隊伍數（2~8）</label><input type="number" id="sTeams" min="2" max="8" value="8"></div>
    <div><label>每隊人數</label><input type="number" id="sRoster" min="1" max="30" value="15"></div>
    <div><label>每輪每隊選幾名</label><input type="number" id="sPerTurn" min="1" max="10" value="1"></div>
  </div>

  <select id="sPhase">
    <option value="draftOnly">只選秀（城市隨時自由指派）</option>
    <option value="cityFirst">先選城，再選秀</option>
    <option value="merged">同一輪選城＋選秀，都選才算完成</option>
  </select>

    <div><label class="tog" style="margin:10px 0 4px"><input type="checkbox" id="sBudgetOn">啟用選秀額度上限</label>

  </div>

  <div id="teamnames"></div>
  <div class="dbtns">
    <button class="btn" id="sShuffle">隨機洗牌順位</button>
    <button class="btn" id="sApply">套用（重排順位不清名單）</button>
    <button class="btn seal" id="sReset">全部重來</button>
  </div>

/* ══ 連線層 ══ */
const NET = { on:false, db:null, room:null, isHost:false, myName:"", seats:{}, applyingRemote:false };
const CID = (()=>{ try{ let c = localStorage.getItem("s11cid"); if(!c){ c = Math.random().toString(36).slice(2,10); localStorage.setItem("s11cid", c);} return c; }catch(e){ return Math.random().toString(36).slice(2,10); } })();
function djb2(s){ let h=5381; for(const ch of s) h=((h*33)^ch.charCodeAt(0))>>>0; return h.toString(36); }
function randCode(n){ const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; return Array.from({length:n},()=>A[Math.floor(Math.random()*A.length)]).join(""); }

function mySeat(){
  for(const k in NET.seats) if(NET.seats[k] && NET.seats[k].cid===CID) return +k;
  return null;
}
function isHost(){ return !NET.on || NET.isHost; }
function canEditTeam(i){ return !NET.on || NET.isHost || mySeat()===i; }
function canDraftNow(){
  if(!NET.on || NET.isHost) return true;
  const t = curTurn();
  return t!==null && mySeat()===t;
}
function netStatusText(){
  if(!NET.on) return FIREBASE_CONFIG.apiKey ? "單機模式（未進房間）" : "單機模式";
  const s = mySeat();
  return `房間 ${NET.room}・${NET.isHost?"主持人":"玩家"}${NET.myName?"・"+NET.myName:""}${s!==null?"・座位:"+(S.teams[s]?.name??s):""}`;
}

/* 清理成 Firebase 可存的純資料，並補回讀取時被丟棄的空欄位 */
function packState(){ return JSON.parse(JSON.stringify(S)); }
function normalizeState(s){
  if(!s || !Array.isArray(s.teams) || !s.teams.length) s = {teams:defaultTeams(8), rosterSize:15, priceCol:4, mode:"snake", history:[], cityOf:{}};
  s.history = s.history || [];
  s.cityOf = s.cityOf || {};
  s.skillOf = s.skillOf || {};
  s.picksPerTurn = s.picksPerTurn || 1;
  s.phaseMode = s.phaseMode || "draftOnly";
  s.citiesPerTeam = s.citiesPerTeam || 1;
  if(s.budgetOn===undefined) s.budgetOn = false;
  s.budget = s.budget || 500;
  if(!s.mode) s.mode = "snake";
  if(!s.rosterSize) s.rosterSize = 15;
  if(s.priceCol===undefined) s.priceCol = 4;
  s.teams.forEach((t,i)=>{
    t.cities = t.cities || [];
    t.picks = t.picks || [];
    if(t.capital===undefined) t.capital = null;
    if(t.lord===undefined) t.lord = null;
    if(t.colorIdx===undefined) t.colorIdx = i;
    if(!t.name) t.name = "隊"+(i+1);
  });
  return s;
}

function pushState(){
  if(!NET.on || NET.applyingRemote) return;
  NET.db.ref("rooms/"+NET.room+"/state").set(packState())
    .catch(e=>toast("同步失敗："+e.message));
}
/* 選人用交易寫入：以 history 長度做樂觀鎖，防止兩人同時搶選 */
function netDraft(newState, expectLen, okMsg){
  NET.db.ref("rooms/"+NET.room+"/state").transaction(cur=>{
    const len = (cur && cur.history) ? cur.history.length : 0;
    if(cur && len !== expectLen) return;      // 已被別人先選 → 放棄
    return newState;
  }, (err, committed)=>{
    if(err) toast("同步錯誤："+err.message);
    else if(!committed) toast("這一手已被搶先，請重新選擇");
    else if(okMsg) toast(okMsg);
  });
}

async function netConnect(){
  if(NET.db) return true;
  if(!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.databaseURL){
    toast("找不到連線設定：請確認 config.js 與網頁放在一起且已填入資料"); return false;
  }
  $("#netstatus").textContent = "連線中…";
  try{
    await new Promise((res,rej)=>{
      let n=0; const done=()=>{ if(++n===2) res(); };
      for(const f of ["firebase-app-compat.js","firebase-database-compat.js"]){
        const sc = document.createElement("script");
        sc.src = "https://www.gstatic.com/firebasejs/9.23.0/"+f;
        sc.onload = done; sc.onerror = ()=>rej(new Error("無法載入 Firebase（檢查網路）"));
        document.head.appendChild(sc);
      }
    });
    firebase.initializeApp(FIREBASE_CONFIG);
    NET.db = firebase.database();
    return true;
  }catch(e){ toast(e.message); $("#netstatus").textContent = "單機模式"; return false; }
}

function attachRoom(room){
  NET.room = room; NET.on = true;
  NET.db.ref("rooms/"+room+"/state").on("value", snap=>{
    const v = snap.val();
    if(v){ NET.applyingRemote = true; S = normalizeState(v); NET.applyingRemote = false; }
    render();
  });
  NET.db.ref("rooms/"+room+"/seats").on("value", snap=>{
    NET.seats = snap.val() || {}; render();
  });
  $("#roomOffline").style.display = "none";
  $("#roomOnline").style.display = "block";
  $("#rmShow").textContent = room;
  $("#rmRole").textContent = NET.isHost ? "你是主持人：可以調整設定、重置、代替任何隊伍操作。" : "你是玩家：認領座位後，輪到你的隊伍即可選人。";
  try{ localStorage.setItem("s11room", JSON.stringify({room, host:NET.isHost, name:NET.myName})); }catch(e){}
}

async function createRoom(){
  if(!await netConnect()) return;
  NET.myName = $("#rmName").value.trim() || "主持人";
  const room = randCode(8), hostKey = randCode(10);
  NET.isHost = true;
  try{ localStorage.setItem("s11hostkey-"+room, hostKey); }catch(e){}
  await NET.db.ref("rooms/"+room).set({
    meta: { hostHash: djb2(hostKey), created: Date.now() },
    state: packState(),
  });
  attachRoom(room);
  toast("房間已建立："+room);
}
async function joinRoom(){
  if(!await netConnect()) return;
  const room = $("#rmCode").value.trim().toUpperCase();
  if(!room){ toast("請輸入房間碼"); return; }
  NET.myName = $("#rmName").value.trim() || "玩家";
  const snap = await NET.db.ref("rooms/"+room+"/meta").get();
  if(!snap.exists()){ toast("找不到這個房間"); return; }
  let hk = null; try{ hk = localStorage.getItem("s11hostkey-"+room); }catch(e){}
  NET.isHost = !!(hk && djb2(hk) === snap.val().hostHash);
  attachRoom(room);
  toast("已加入房間");
}
function leaveRoom(){
  const s = mySeat();
  if(s!==null) NET.db.ref("rooms/"+NET.room+"/seats/"+s).remove();
  NET.db.ref("rooms/"+NET.room+"/state").off();
  NET.db.ref("rooms/"+NET.room+"/seats").off();
  NET.on = false; NET.room = null; NET.isHost = false; NET.seats = {};
  try{ localStorage.removeItem("s11room"); }catch(e){}
  $("#roomOffline").style.display = "block";
  $("#roomOnline").style.display = "none";
  render();
}
function claimSeat(i){
  const cur = NET.seats[i];
  if(cur && cur.cid !== CID && !NET.isHost){ toast("座位已被 "+cur.name+" 認領"); return; }
  if(cur && (cur.cid === CID || NET.isHost)){
    NET.db.ref("rooms/"+NET.room+"/seats/"+i).remove(); return;
  }
  const old = mySeat();
  if(old !== null) NET.db.ref("rooms/"+NET.room+"/seats/"+old).remove();
  NET.db.ref("rooms/"+NET.room+"/seats/"+i).set({name: NET.myName || "玩家", cid: CID});
}

/* ══ 狀態 ══ */
let S = {
  teams: [],            // {name, cities:[城市編號], capital, colorIdx, picks:[dataIdx], lord}
  rosterSize: 15,
  priceCol: 4,
  mode: "snake",        // snake=蛇形 | linear=順序
  history: [],          // [{t, o:dataIdx} 或 {t, c:城市編號}]
  cityOf: {},           // 武將dataIdx → 駐守城市編號
  skillOf: {},          // 瑜雲武將dataIdx → 選定特技（選定後不可改）
  picksPerTurn: 1,      // 一輪每隊選幾名武將
  phaseMode: "draftOnly", // merged=城與人同輪 | cityFirst=先選城再選秀 | draftOnly=只選秀
  citiesPerTeam: 1,     // 每隊城市數（merged / cityFirst）
  budgetOn: false,
  budget: 500,
};
let manualTeam = null;  // 手動指定的選城隊伍（null=自動跟隨選秀順位）
function activeTeamIdx(){
  if(NET.on && !NET.isHost){ const s = mySeat(); if(s!==null) return s; }
  const t = manualTeam ?? curTurn(); return (t===null||t>=S.teams.length)?0:t;
}
function teamColor(i){ return FLAG_COLORS[(S.teams[i]?.colorIdx ?? i) % FLAG_COLORS.length]; }
let expandedPick = null;  // 展開城市指派的武將
const takenBy = () => {const m={};S.teams.forEach((tm,t)=>tm.picks.forEach(o=>m[o]=t));return m;};

function defaultTeams(n){
  const base = ["一","二","三","四","五","六","七","八"];
  return Array.from({length:n},(_,i)=>({name:"第"+base[i]+"隊", cities:[], capital:null, colorIdx:i, picks:[], lord:null}));
}

/* ══ 回合引擎 ══ */
function teamOrder(r){
  const n = S.teams.length, idx = Array.from({length:n},(_,i)=>i);
  return (S.mode==="snake" && r%2===1) ? idx.reverse() : idx;
}
function spentOf(i){ return S.teams[i].picks.reduce((s,o)=>s+(+DATA[o][S.priceCol]||0),0); }
function draftRounds(){ return Math.ceil(S.rosterSize / Math.max(1,S.picksPerTurn)); }

/* 回傳 {t, needCity, needPicks, r, phase} 或 null（全部完成）*/
function turnPlan(){
  const k = Math.max(1,S.picksPerTurn), dr = draftRounds(), cr = S.citiesPerTeam;
  const wantPick = r => Math.min((r+1)*k, S.rosterSize);
  if(S.phaseMode==="cityFirst"){
    for(let r=0;r<cr;r++) for(const t of teamOrder(r))
      if(S.teams[t].cities.length < r+1) return {t, r, needCity:true, needPicks:0, phase:"city"};
    for(let r=0;r<dr;r++) for(const t of teamOrder(r))
      if(S.teams[t].picks.length < wantPick(r)) return {t, r, needCity:false, needPicks:wantPick(r)-S.teams[t].picks.length, phase:"draft"};
    return null;
  }
  if(S.phaseMode==="merged"){
    const R = Math.max(cr, dr);
    for(let r=0;r<R;r++) for(const t of teamOrder(r)){
      const wc = Math.min(r+1, cr), wp = wantPick(Math.min(r, dr-1));
      const nc = S.teams[t].cities.length < wc, np = Math.max(0, (r<dr? wp:0) - S.teams[t].picks.length);
      if(nc || np>0) return {t, r, needCity:nc, needPicks:np, phase:"merged"};
    }
    return null;
  }
  for(let r=0;r<dr;r++) for(const t of teamOrder(r))
    if(S.teams[t].picks.length < wantPick(r)) return {t, r, needCity:false, needPicks:wantPick(r)-S.teams[t].picks.length, phase:"draft"};
  return null;
}
function curTurn(){ const p = turnPlan(); return p? p.t : null; }
function canPickCityNow(){
  if(S.phaseMode==="draftOnly") return true;   // 只選秀：城市隨時可指派
  const p = turnPlan(); return !!(p && p.needCity);
}
function canPickOfficerNow(){
  const p = turnPlan(); return !!(p && p.needPicks>0);
}

/* ══ 渲染 ══ */
const $ = s => document.querySelector(s);
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1600);}

function renderPickbar(){
  const p = turnPlan(), n = S.teams.length;
  $("#npTeam").textContent = p===null ? "選秀完成" : S.teams[p.t].name;
  const yourTurn = NET.on && !NET.isHost && mySeat()!==null && p && mySeat()===p.t;
  if(p===null) $("#npRound").textContent = "";
  else{
    const need = [];
    if(p.needCity) need.push("選 1 座城");
    if(p.needPicks>0) need.push(`選 ${p.needPicks} 名武將`);
    const phaseTag = p.phase==="city" ? "【選城階段】" : (p.phase==="merged" ? "" : "");
    $("#npRound").textContent = `${phaseTag}第 ${p.r+1} 輪・${need.join(" ＋ ")}` + (yourTurn?"　★ 輪到你！":"");
  }
  const sn = $("#snake");
  sn.innerHTML = "";
  const R = S.phaseMode==="draftOnly" ? draftRounds() : Math.max(S.citiesPerTeam, draftRounds());
  const cells = [];
  for(let r=0;r<R;r++) for(const t of teamOrder(r)) cells.push({r,t});
  const curIdx = p===null ? cells.length : cells.findIndex(c=>c.r===p.r && c.t===p.t);
  const from = Math.max(0, curIdx-4);
  cells.slice(from, from+30).forEach((c,k)=>{
    const idx = from+k;
    const d = document.createElement("div");
    d.className = "snakecell" + (idx<curIdx?" done":"") + (idx===curIdx?" cur":"");
    if(S.mode==="snake" && c.r%2===1 && teamOrder(c.r)[0]===c.t) d.classList.add("rev");
    d.innerHTML = `<span class="tn">${S.teams[c.t].name.replace(/^第|隊$/g,"").slice(0,2)}</span><span>R${c.r+1}</span>`;
    sn.appendChild(d);
  });
}

function renderTeams(){
  const t = curTurn(), act = activeTeamIdx(), wrap = $("#teams");
  wrap.innerHTML = "";
  S.teams.forEach((tm,i)=>{
    const spent = tm.picks.reduce((s,o)=>s+(+DATA[o][S.priceCol]||0),0);
    const cap = tm.capital ?? tm.cities[0];
    const div = document.createElement("div");
    div.className = "team" + (i===t?" cur":"") + (i===act?" act":"");
    div.dataset.i = i;
    const cityChips = tm.cities.map(c=>`<span class="citychip${c===cap?' cap':''}" data-t="${i}" data-c="${c}" title="點擊設為首都" style="border-color:${teamColor(i)}">${c===cap?'<b class="capmark">都</b>':''}${CITIES[c][0]}<button class="crm" data-t="${i}" data-c="${c}">×</button></span>`).join("");
    const pickChips = tm.picks.map(o=>{
      const d = DATA[o], isLord = tm.lord===o;
      const oc = S.cityOf[o];
      const cityTag = (oc!==undefined && tm.cities.includes(oc)) ? `<i class="octag">${CITIES[oc][0]}</i>` : "";
      let expand = "";
      if(expandedPick===o){
        expand = `<div class="assignrow" data-o="${o}">駐守：` + (tm.cities.length? tm.cities.map(c=>
          `<button class="cbtn${(oc===c||(oc===undefined&&c===cap))?' on':''}" data-o="${o}" data-c="${c}">${c===cap?'都・':''}${CITIES[c][0]}</button>`).join("") : "（先在地圖指派城市）") + `</div>`;
      }
      return `<span class="chip${d[2]!==''?' custom':''}${expandedPick===o?' open':''}" data-o="${o}">
        <button class="lord${isLord?' on':''}" data-t="${i}" data-o="${o}" title="設為君主">君</button>
        <span class="chipname" data-o="${o}">${d[0]}${S.skillOf[o]? `<i class="sktag">${S.skillOf[o]}</i>`:""}${cityTag}</span><button class="rm" data-t="${i}" data-o="${o}" title="退回">×</button></span>${expand}`;
    }).join("");
    const seat = NET.on ? (NET.seats[i] || null) : null;
    const seatline = NET.on ? `<div class="seatline">座位：${seat? `<b>${seat.name}</b>` : '<span style="opacity:.5">空</span>'}
      <button class="claim" data-i="${i}">${seat? (seat.cid===CID?'釋出':'（已認領）') : '認領'}</button></div>` : "";
    div.innerHTML = `
      <div class="thead">
        <button class="tdot" data-i="${i}" title="選擇勢力色" style="background:${teamColor(i)}"></button>
        <input class="tname" value="${tm.name}" data-i="${i}">
        <div class="tstat">${tm.picks.length}／${S.rosterSize} 人<br>${S.budgetOn? `額度 ${spent}／${S.budget}` : `價格計 ${spent}`}</div>
      </div>
      ${seatline}
      <div class="tcity">城市 ${cityChips || '<span style="opacity:.5">（點上方地圖指派）</span>'}</div>
      <div class="picks">${pickChips}</div>`;
    wrap.appendChild(div);
  });
  wrap.querySelectorAll(".tname").forEach(el=>el.addEventListener("change",e=>{
    const i = +e.target.dataset.i;
    if(!canEditTeam(i)){ toast("只能編輯自己的隊伍"); render(); return; }
    S.teams[i].name = e.target.value || "隊"+(i+1); sync();
  }));
  wrap.querySelectorAll(".claim").forEach(el=>el.addEventListener("click",e=>{
    claimSeat(+e.target.dataset.i);
  }));
  wrap.querySelectorAll(".team").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.closest("input,button,.chip,.citychip,.assignrow")) return;
    manualTeam = +el.dataset.i; sync();
  }));
  wrap.querySelectorAll(".tdot").forEach(el=>el.addEventListener("click",e=>{
    const i = +e.target.dataset.i;
    if(!canEditTeam(i)){ toast("只能改自己隊伍的顏色"); return; }
    openColorPicker(i);
  }));
  wrap.querySelectorAll(".citychip").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.classList.contains("crm")) return;
    const t = +el.dataset.t;
    if(!canEditTeam(t)){ toast("只能編輯自己的隊伍"); return; }
    S.teams[t].capital = +el.dataset.c; sync();
  }));
  wrap.querySelectorAll(".crm").forEach(el=>el.addEventListener("click",e=>{
    if(!canEditTeam(+e.target.dataset.t)){ toast("只能編輯自己的隊伍"); return; }
    const tm = S.teams[+e.target.dataset.t], c = +e.target.dataset.c;
    tm.cities = tm.cities.filter(x=>x!==c);
    if(tm.capital===c) tm.capital = tm.cities[0] ?? null;
    tm.picks.forEach(o=>{ if(S.cityOf[o]===c) delete S.cityOf[o]; });
    sync();
  }));
  wrap.querySelectorAll(".chipname").forEach(el=>el.addEventListener("click",e=>{
    const o = +el.dataset.o;
    expandedPick = (expandedPick===o)? null : o; sync();
  }));
  wrap.querySelectorAll(".cbtn").forEach(el=>el.addEventListener("click",e=>{
    const o = +el.dataset.o, owner = S.teams.findIndex(tm=>tm.picks.includes(o));
    if(owner>=0 && !canEditTeam(owner)){ toast("只能編輯自己的隊伍"); return; }
    S.cityOf[o] = +el.dataset.c; expandedPick = null; sync();
  }));
  wrap.querySelectorAll(".lord").forEach(el=>el.addEventListener("click",e=>{
    if(!canEditTeam(+e.target.dataset.t)){ toast("只能編輯自己的隊伍"); return; }
    S.teams[+e.target.dataset.t].lord = +e.target.dataset.o; sync();
  }));
  wrap.querySelectorAll(".rm").forEach(el=>el.addEventListener("click",e=>{
    const t=+e.target.dataset.t, o=+e.target.dataset.o, tm=S.teams[t];
    if(!canEditTeam(t)){ toast("只能編輯自己的隊伍"); return; }
    tm.picks = tm.picks.filter(x=>x!==o);
    if(tm.lord===o) tm.lord = tm.picks[0] ?? null;
    delete S.cityOf[o];
    S.history = S.history.filter(h=>!(h.t===t&&h.o===o));
    toast(DATA[o][0]+" 退回武將池"); sync();
  }));
}

/* ══ 勢力色選擇 ══ */
let colorTarget = 0;
function openColorPicker(i){
  colorTarget = i;
  const used = {}; S.teams.forEach((tm,k)=>{ if(k!==i) used[tm.colorIdx ?? k] = tm.name; });
  $("#colorgrid").innerHTML = FLAG_COLORS.map((c,k)=>
    `<button class="sw${(S.teams[i].colorIdx??i)===k?' on':''}" data-k="${k}" style="background:${c}" title="${k}${used[k]? '（'+used[k]+'使用中）':''}">${used[k]?'●':''}</button>`).join("");
  $("#colorgrid").querySelectorAll(".sw").forEach(el=>el.addEventListener("click",()=>{
    S.teams[colorTarget].colorIdx = +el.dataset.k;
    $("#dlgColor").close(); sync();

let sortKeys = [{k:17, asc:false}];   // 多重排序：後點的成為主鍵（最多 3 層）
const COLS = [
  {k:0, n:"姓名"}, {k:"price", n:"價格"}, {k:3, n:"相性"},
  {k:12,n:"統"},{k:13,n:"武"},{k:14,n:"智"},{k:15,n:"政"},{k:16,n:"魅"},
  {k:28,n:"基戰"},{k:29,n:"統武智"},{k:17,n:"総合"},{k:18,n:"特技"},
  {k:19,n:"槍"},{k:20,n:"戟"},{k:21,n:"弩"},{k:22,n:"騎"},{k:23,n:"兵"},{k:24,n:"水"},
  {k:"own",n:"狀態"}
];
function renderHead(){
  $("#thead").innerHTML = "<tr>"+COLS.map(c=>{
    const key = c.k==="price"? S.priceCol : c.k;
    const pos = sortKeys.findIndex(s=>s.k===key);
    const cls = pos>=0 ? ("sorted"+(sortKeys[pos].asc?" asc":"")) : "";
    const rank = (pos>=0 && sortKeys.length>1) ? `<i class="srank">${pos+1}</i>` : "";
    return `<th data-k="${c.k}" class="${cls}">${c.n}${rank}</th>`;
  }).join("")+"</tr>";
  $("#thead").querySelectorAll("th").forEach(th=>th.addEventListener("click",()=>{
    let k = th.dataset.k;
    if(k==="price") k = S.priceCol; else if(k==="own") return;
    k = isNaN(+k)? k : +k;
    const pos = sortKeys.findIndex(s=>s.k===k);
    if(pos===0) sortKeys[0].asc = !sortKeys[0].asc;                 // 主鍵：切換升降
    else{
      if(pos>0) sortKeys.splice(pos,1);
      sortKeys.unshift({k, asc:(k===0||k===18)});                   // 新點的成為主鍵
      sortKeys = sortKeys.slice(0,3);
    }
    renderTable();
  }));
}
function renderTable(){
  renderHead();
  const q = $("#q").value.trim(), hide = $("#fHide").checked;
  const fF=$("#fFemale").checked, fA=$("#fAncient").checked;
  const f38=$("#f38R").checked, fR=$("#fRadish").checked, fY=$("#fYuyun").checked;
  const taken = takenBy();
  let idx = DATA.map((_,i)=>i).filter(i=>{
    const d = DATA[i];
    if(q && !(d[0].includes(q) || (d[18]||"").includes(q))) return false;
    if(hide && taken[i]!==undefined) return false;
    if(fF && d[25]!==1) return false;
    if(fA && d[26]!==1) return false;
    if(f38 && d[2]!=='38R') return false;
    if(fR && d[2]!=='蘿蔔') return false;
    if(fY && d[2]!=='瑜雲') return false;
    const ak = +$("#aptKind").value;
    if(ak >= 0 && (d[ak]??0) < +$("#aptMin").value) return false;
    return true;
  });
  idx.sort((a,b)=>{
    for(const {k,asc} of sortKeys){
      let va=DATA[a][k], vb=DATA[b][k], r;
      if(typeof va==="string"||typeof vb==="string"){
        va=String(va??""); vb=String(vb??"");
        r = asc? va.localeCompare(vb,"zh-Hant") : vb.localeCompare(va,"zh-Hant");
      }else{ va=+va||0; vb=+vb||0; r = asc? va-vb : vb-va; }
      if(r) return r;
    }
    return 0;
  });
  $("#count").textContent = `${idx.length} 名武將`;
  const rows = idx.map(i=>{
    const d=DATA[i], tk=taken[i];
    const badges = (d[25]?'<span class="badge f">女</span>':"")+(d[26]?'<span class="badge g">古</span>':"")+
      (d[2]!==''?`<span class="badge c">${d[2]}</span>`:"");
    const apt = [19,20,21,22,23,24].map(k=>{const v=d[k]??0;const L=APT_L[v]||"C";return `<td class="apt" style="text-align:center"><b class="${L}">${L}</b></td>`;}).join("");
    return `<tr data-i="${i}" class="${tk!==undefined?"taken":""}">
      <td class="nm" title="${d[0]}">${d[0]}${badges}</td>
      <td class="price">${d[S.priceCol]??""}</td>
      <td class="num">${d[3]??""}</td>
      <td class="num">${d[12]??""}</td><td class="num">${d[13]??""}</td><td class="num">${d[14]??""}</td>
      <td class="num">${d[15]??""}</td><td class="num">${d[16]??""}</td>
      <td class="num">${d[28]??""}</td>
      <td class="num">${d[29]??""}</td>
      <td class="num">${d[17]??""}</td>
      <td class="skill">${S.skillOf[i] ? S.skillOf[i]+"★" : (d[30]? "＜"+d[30].join("/")+"＞" : (d[18]??""))}</td>
      ${apt}
      <td class="owner">${tk!==undefined? S.teams[tk].name : ""}</td>
    </tr>`;
  }).join("");
  $("#tbody").innerHTML = rows;
  $("#tbody").querySelectorAll("tr:not(.taken)").forEach(tr=>tr.addEventListener("click",()=>draft(+tr.dataset.i)));
}

/* ══ 選人 ══ */
function commitDraft(i, skill){
  const p = turnPlan(), t = p.t, tm = S.teams[t];
  if(NET.on){
    const ns = packState(), nt = ns.teams[t];
    nt.picks = nt.picks || []; nt.picks.push(i);
    if(nt.lord===null || nt.lord===undefined) nt.lord = i;
    ns.history = ns.history || []; ns.history.push({t, o:i});
    if(skill){ ns.skillOf = ns.skillOf || {}; ns.skillOf[i] = skill; }
    netDraft(ns, S.history.length, `${tm.name}　選走　${DATA[i][0]}${skill?"（"+skill+"）":""}`);
    return;
  }
  tm.picks.push(i);
  if(tm.lord===null) tm.lord = i;
  S.history.push({t, o:i});
  if(skill) S.skillOf[i] = skill;
  toast(`${tm.name}　選走　${DATA[i][0]}${skill?"（"+skill+"）":""}`);
  sync();
}
function draft(i){
  if(!canDraftNow()){ toast("還沒輪到你的隊伍"); return; }
  if(!canPickOfficerNow()){
    const p = turnPlan();
    toast(p && p.needCity ? "本輪請先在地圖選城" : "選秀已結束"); return;
  }
  const p = turnPlan(), tm = S.teams[p.t];
  if(takenBy()[i]!==undefined){ toast("這名武將已被選走"); return; }
  if(S.budgetOn){
    const price = +DATA[i][S.priceCol]||0, left = S.budget - spentOf(p.t);
    if(price > left){ toast(`額度不足：剩 ${left}，${DATA[i][0]} 要 ${price}`); return; }
  }
  manualTeam = null;
  const opts = DATA[i][30];
  if(opts && opts.length && !S.skillOf[i]){ openSkillPicker(i, opts); return; }
  commitDraft(i, S.skillOf[i] || null);
}

/* 選城（走回合流程）*/
function pickCity(c){
  const act = activeTeamIdx();
  if(!canEditTeam(act)){ toast("只能指派自己隊伍的城市（先認領座位）"); return; }
  const own = cityOwner(c), tm = S.teams[act];
  if(own === act){
    if(S.phaseMode!=="draftOnly"){ toast("選城階段不可退城，請由主持人復原"); return; }
    tm.cities = tm.cities.filter(x=>x!==c);
    if(tm.capital===c) tm.capital = tm.cities[0] ?? null;
    tm.picks.forEach(o=>{ if(S.cityOf[o]===c) delete S.cityOf[o]; });
    sync(); return;
  }
  if(own >= 0){ toast(`${CITIES[c][0]} 已屬於 ${S.teams[own].name}`); return; }
  if(S.phaseMode!=="draftOnly"){
    const p = turnPlan();
    if(!p || p.t!==act || !p.needCity){ toast(p && p.t===act ? "本輪的城已選完" : "還沒輪到你的隊伍選城"); return; }
  }
  if(NET.on){
    const ns = packState(), nt = ns.teams[act];
    nt.cities = nt.cities || []; nt.cities.push(c);
    if(nt.capital===null || nt.capital===undefined) nt.capital = c;
    ns.history = ns.history || []; ns.history.push({t:act, c});
    netDraft(ns, S.history.length, `${S.teams[act].name}　取得　${CITIES[c][0]}`);
    return;
  }
  tm.cities.push(c);
  if(tm.capital===null||tm.capital===undefined) tm.capital = c;
  S.history.push({t:act, c});
  sync();
}

/* ══ 匯出 ══ */
function officerToken(d, i){
  const sk = (i!==undefined && S.skillOf[i]) ? `[${S.skillOf[i]}]` : "";
  if(d[2]!=='') return d[0] + sk;                         // 自訂武將（38R/蘿蔔/瑜雲）：以姓名輸出
  if(d[1]!==null && (d[0].includes('(')||DUP_NAMES.has(d[0]))) return "#"+d[1]; // 同名武將用編號
  return d[0];
}
function buildIni(){
  let warn = [];
  let out = [
    "# 由選秀網頁匯出 — make_scenario.py 設定檔",
    "[全域]",
    "模版 = Scen015 - 空白地圖模版.s11",
    "輸出 = PVP劇本.s11",
    "士兵 = 100000","金 = 50000","糧 = 300000",
    "槍 = 10000","戟 = 10000","弩 = 10000","軍馬 = 10000",
    "衝車 = 10","井闌 = 10","投石 = 10","木獸 = 10",
    "走舸 = 10","樓船 = 10","鬥艦 = 10",
    "忠誠 = 255",""];
  S.teams.forEach((tm,i)=>{
    if(!tm.picks.length) return;
    const lord = tm.lord ?? tm.picks[0];
    const customs = tm.picks.filter(o=>DATA[o][2]!=='');
    if(customs.length) warn.push(`${tm.name}：${customs.map(o=>DATA[o][0]).join("、")}`);
    const cap = tm.capital ?? tm.cities[0];
    const cityOrder = cap!==undefined ? [cap, ...tm.cities.filter(c=>c!==cap)] : [];
    // 依駐守城市分組（未指派或無效 → 首都；君主必在首都）
    const groups = new Map(cityOrder.map(c=>[c,[]]));
    tm.picks.filter(o=>o!==lord).forEach(o=>{
      let c = S.cityOf[o];
      if(c===undefined || !tm.cities.includes(c)) c = cap;
      if(!groups.has(c)) groups.set(c, []);
      groups.get(c).push(o);
    });
    out.push(`[勢力${i+1}]　# ${tm.name}`);
    out.push(`君主 = ${officerToken(DATA[lord], lord)}`);
    out.push(`旗色 = ${tm.colorIdx ?? i}`);
    if(!cityOrder.length){ out.push(`城市 = （請填城市）`); out.push(""); return; }
    cityOrder.forEach((c,k)=>{
      const suf = k===0? "" : String(k+1);
      out.push(`城市${suf} = ${CITIES[c][0]}`);
      const g = groups.get(c) || [];
      if(k===0 || g.length) out.push(`武將${suf} = ${g.map(o=>officerToken(DATA[o], o)).join(" ")}`);
    });
    out.push("");
  });
  $("#exNote").textContent = warn.length ?
    "含自訂武將（請確認 自訂武將.csv 與 特技表.json 跟 make_scenario.py 放在同資料夾）："+warn.join("；") : "";
  return out.join("\n");
}

(function init(){
  try{ const s = localStorage.getItem("san11draft"); if(s){ S = JSON.parse(s); } }catch(e){}
  if(!S.teams || !S.teams.length) S.teams = defaultTeams(8);
  if(!S.mode) S.mode = "snake";
  if(!S.cityOf) S.cityOf = {};
  if(!S.skillOf) S.skillOf = {};
  if(!S.picksPerTurn) S.picksPerTurn = 1;
  if(!S.phaseMode) S.phaseMode = "draftOnly";
  if(!S.citiesPerTeam) S.citiesPerTeam = 1;
  if(S.budgetOn===undefined) S.budgetOn = false;
  if(!S.budget) S.budget = 500;
  S.teams.forEach((t,i)=>{ 
    if(t.colorIdx===undefined) t.colorIdx = i;
    if(t.capital===undefined) t.capital = null;
    if(!Array.isArray(t.cities)){
    const c = CITIES.findIndex(x=>x[0]===(t.city||"").trim());
    t.cities = c>=0 ? [c] : []; delete t.city;
  }});
  $("#priceCol").value = S.priceCol;
  render(); persist();
  restoreRoom();
})();
</script>
